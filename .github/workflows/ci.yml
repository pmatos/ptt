name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs (e.g. a new push to a PR) instead of running them out.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Run tests
        run: uv run pytest

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Typecheck (ty)
        run: uv run ty check
      - name: Lint (ruff)
        run: uv run ruff check
      - name: Format check (ruff)
        run: uv run ruff format --check

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Lint workflows (zizmor)
        run: uvx zizmor@1.26.1 --offline .github/workflows
      - name: Lint workflows (actionlint)
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
